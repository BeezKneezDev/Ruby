databases:
  - name: ruby-achievements-db
    plan: free
    databaseName: ruby_achievements
    user: ruby

services:
  - type: web
    name: ruby-achievements-api
    runtime: node
    buildCommand: npm run render-build
    startCommand: node server/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: ruby-achievements-db
          property: connectionString
